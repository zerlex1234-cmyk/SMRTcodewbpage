<html lang="en">
<head>
  <meta charset="utf-8" />

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    body { font-family: Arial, sans-serif; margin: 24px; background: #111; color: #eee; }
    .card { max-width: 520px; background: #1d1d1d; border: 1px solid #333; padding: 16px; border-radius: 8px; }
    label { display: block; margin: 10px 0 6px; font-size: 14px; color: #bbb; }
    select, button { width: 100%; padding: 10px; border-radius: 6px; border: 1px solid #444; background: #0f0f0f; color: #eee; }
    button { margin-top: 14px; background: #c4c70c; color: #111; font-weight: 700; cursor: pointer; }
    #status { margin-top: 12px; min-height: 20px; color: #9bd8ff; }
    #map-wrap { margin-top: 20px; max-width: 700px; }
    #map-canvas { width: 100%; border: 1px solid #333; background: #0b0b0b; }

<body>
  <h2>SMRT Technologies: Store Map and Route Tracking</h2>
  <div class="card">
    <label for="cat-select">Category</label>
    <select id="cat-select" disabled>
      <option>Loading categories...</option>
    </select>

    <label for="item-select">Item</label>
    <select id="item-select" disabled>
      <option>Choose a category first</option>
    </select>

    <label for="entrance-select">Entrance</label>
    <select id="entrance-select">
      <option value="">Choose entrance</option>
      <option value="North">North</option>
      <option value="West">West</option>
      <option value="East">East</option>
    </select>

    <button id="find-btn" onclick="triggerFind()" disabled>Find My Route</button>
    <div id="status">Loading runtime...</div>
    <div class="small">
    </div>
  </div>

  <div id="map-wrap">
    <canvas id="map-canvas"></canvas>
    <p id="step-count"></p>
  </div>

  <script type="py" config='{"packages":["numpy","openpyxl"]}'>
import js
import json
import heapq
import io
import asyncio
from collections import deque
from pyodide.http import pyfetch
import numpy as np
import openpyxl

GRID_SIZE = 41
ENTRANCES = {"North": (9, 11), "West": (17, 1), "East": (18, 36)}

_grid = None
_walkable_mask = None
_items_data = []
_category_map = {}

class Node:
    __slots__ = ("position", "parent", "g", "h", "f")
    def __init__(self, position, parent=None):
        self.position = position
        self.parent = parent
        self.g = self.h = self.f = 0
    def __eq__(self, other): return self.position == other.position
    def __hash__(self): return hash(self.position)
    def __lt__(self, other): return self.f < other.f

def heuristic(a, b):
    return abs(a[0] - b[0]) + abs(a[1] - b[1])

def a_star(grid, start, end, walkable_mask):
    start_node, end_node = Node(start), Node(end)
    open_list = []
    heapq.heappush(open_list, start_node)
    closed_set = set()
    g_costs = {start: 0}

    while open_list:
        current = heapq.heappop(open_list)
        if current.position in closed_set:
            continue
        closed_set.add(current.position)

        if current == end_node:
            path = []
            while current:
                path.append(current.position)
                current = current.parent
            return path[::-1]

        for dr, dc in [(0, -1), (0, 1), (-1, 0), (1, 0)]:
            pos = (current.position[0] + dr, current.position[1] + dc)
            if not (0 <= pos[0] < grid.shape[0] and 0 <= pos[1] < grid.shape[1]):
                continue
            if grid[pos[0], pos[1]] == 1:
                continue
            if grid[pos[0], pos[1]] == 2 and pos != end:
                continue
            if not walkable_mask[pos[0], pos[1]] and pos != end:
                continue

            neighbor = Node(pos, current)
            new_g = current.g + 1
            if new_g < g_costs.get(pos, float("inf")):
                neighbor.g = new_g
                neighbor.h = heuristic(pos, end)
                neighbor.f = neighbor.g + neighbor.h
                g_costs[pos] = new_g
                heapq.heappush(open_list, neighbor)

    return None

def compute_walkable_mask(grid):
    mask = np.zeros(grid.shape, dtype=bool)
    start = (20, 18)
    queue = [start]
    visited = {start}

    while queue:
        r, c = queue.pop(0)
        if grid[r, c] != 1:
            mask[r, c] = True

        for dr, dc in [(0, -1), (0, 1), (-1, 0), (1, 0)]:
            nr, nc = r + dr, c + dc
            if (
                0 <= nr < grid.shape[0]
                and 0 <= nc < grid.shape[1]
                and (nr, nc) not in visited
                and grid[nr, nc] != 1
            ):
                visited.add((nr, nc))
                queue.append((nr, nc))

    return mask

def normalize_target_position(grid, x_val, y_val):
    max_r, max_c = grid.shape
    candidates = []
    raw = (int(x_val), int(y_val))
    shifted = (raw[0] - 1, raw[1] - 1)

    for pos in (raw, shifted):
        r, c = pos
        if 0 <= r < max_r and 0 <= c < max_c and pos not in candidates:
            candidates.append(pos)

    if not candidates:
        return None

    candidates.sort(key=lambda p: (grid[p[0], p[1]] != 2, grid[p[0], p[1]] == 1))
    return candidates[0]

def find_reachable_target(grid, walkable_mask, target):
    tr, tc = target
    queue = deque([(tr, tc)])
    visited = {(tr, tc)}

    while queue:
        r, c = queue.popleft()
        if walkable_mask[r, c] and grid[r, c] != 1:
            return (r, c)

        for dr, dc in ((0, -1), (0, 1), (-1, 0), (1, 0)):
            nr, nc = r + dr, c + dc
            if (
                0 <= nr < grid.shape[0]
                and 0 <= nc < grid.shape[1]
                and (nr, nc) not in visited
                and grid[nr, nc] != 1
            ):
                visited.add((nr, nc))
                queue.append((nr, nc))

    return None

def find_nearest_walkable_tile(grid, walkable_mask, target):
    tr, tc = target
    walkable_positions = np.argwhere((walkable_mask == True) & (grid != 1))
    if walkable_positions.size == 0:
        return None

    best = None
    best_dist = float("inf")
    for r, c in walkable_positions:
        dist = abs(int(r) - tr) + abs(int(c) - tc)
        if dist < best_dist:
            best_dist = dist
            best = (int(r), int(c))
    return best

def expand_target_candidates(grid, walkable_mask, target, limit=120):
    tr, tc = target
    if not (0 <= tr < grid.shape[0] and 0 <= tc < grid.shape[1]):
        return []

    queue = deque([(tr, tc)])
    visited = {(tr, tc)}
    candidates = []

    while queue and len(candidates) < limit:
        r, c = queue.popleft()
        if grid[r, c] != 1 and walkable_mask[r, c]:
            candidates.append((r, c))

        for dr, dc in ((0, -1), (0, 1), (-1, 0), (1, 0)):
            nr, nc = r + dr, c + dc
            if (
                0 <= nr < grid.shape[0]
                and 0 <= nc < grid.shape[1]
                and (nr, nc) not in visited
                and grid[nr, nc] != 1
            ):
                visited.add((nr, nc))
                queue.append((nr, nc))

    return candidates

def set_status(msg, css=""):
    el = js.document.getElementById("status")
    el.textContent = msg
    el.className = css

async def load_grid_async():
    try:
        resp = await pyfetch("Store_Mapping_with_Color_Variable_FIXEDold.xlsx")
        raw = await resp.bytes()
        wb = openpyxl.load_workbook(io.BytesIO(raw), data_only=True)
        ws = wb.worksheets[0]
        grid = np.zeros((GRID_SIZE, GRID_SIZE), dtype=int)

        for row in ws.iter_rows(values_only=True):
            for cell in row:
                if cell is None:
                    continue
                value = str(cell).strip()
                if "," not in value:
                    continue
                parts = value.split(",")
                if len(parts) != 3:
                    continue
                try:
                    x, y, obj_type = int(parts[0]), int(parts[1]), int(parts[2])
                    if 0 <= x - 1 < GRID_SIZE and 0 <= y - 1 < GRID_SIZE:
                        grid[x - 1, y - 1] = obj_type
                except ValueError:
                    pass
        return grid
    except Exception as exc:
        set_status(f"Grid load warning: {exc}")
        return np.zeros((GRID_SIZE, GRID_SIZE), dtype=int)

def receive_items(items_json):
    global _items_data, _category_map
    _items_data = json.loads(items_json)
    _category_map = {}
    for row in _items_data:
        cat = (row.get("Category") or "Other").strip()
        _category_map.setdefault(cat, []).append(row)

    cat_sel = js.document.getElementById("cat-select")
    cat_sel.innerHTML = '<option value="">Choose a category</option>'
    for cat in sorted(_category_map.keys()):
        opt = js.document.createElement("option")
        opt.value = cat
        opt.textContent = cat
        cat_sel.appendChild(opt)
    cat_sel.disabled = False
    js.document.getElementById("find-btn").disabled = False
    set_status(f"Ready. Loaded {len(_items_data)} items.")

def on_category_change(category_name):
    item_sel = js.document.getElementById("item-select")
    item_sel.innerHTML = '<option value="">Choose an item</option>'
    for name in sorted(r["name"] for r in _category_map.get(category_name, [])):
        opt = js.document.createElement("option")
        opt.value = name
        opt.textContent = name
        item_sel.appendChild(opt)
    item_sel.disabled = False

def on_find(item_name, entrance_name):
    if not item_name or not entrance_name:
        set_status("Please select Category, Item, and Entrance.")
        return

    def _norm(value):
        return " ".join(str(value).split()).casefold()

    cat = js.document.getElementById("cat-select").value
    selected_cat_rows = _category_map.get(cat, [])
    matching_rows = [r for r in selected_cat_rows if _norm(r.get("name", "")) == _norm(item_name)]
    if not matching_rows:
        matching_rows = [r for r in _items_data if _norm(r.get("name", "")) == _norm(item_name)]
    if not matching_rows:
        set_status(f"Could not find coordinates for '{item_name}'.")
        return

    start_pos = ENTRANCES[entrance_name]

    def _route_from_target_candidates(target_candidates):
        reachable = None
        for candidate in target_candidates:
            reachable = find_reachable_target(_grid, _walkable_mask, candidate)
            if reachable is not None:
                break

        if reachable is not None:
            strict_path = a_star(_grid, start_pos, reachable, _walkable_mask)
            if strict_path:
                return strict_path, False

        relaxed_mask = _grid != 1
        relaxed_reachable = None
        for candidate in target_candidates:
            relaxed_reachable = find_reachable_target(_grid, relaxed_mask, candidate)
            if relaxed_reachable is not None:
                break

        if relaxed_reachable is None:
            for candidate in target_candidates:
                relaxed_reachable = find_nearest_walkable_tile(_grid, relaxed_mask, candidate)
                if relaxed_reachable is not None:
                    break

        if relaxed_reachable is not None:
            relaxed_path = a_star(_grid, start_pos, relaxed_reachable, relaxed_mask)
            if relaxed_path:
                return relaxed_path, True

        expanded_candidates = []
        seen_expanded = set()
        for candidate in target_candidates:
            nearby = expand_target_candidates(_grid, relaxed_mask, candidate)
            for pos in nearby:
                if pos not in seen_expanded:
                    seen_expanded.add(pos)
                    expanded_candidates.append(pos)

        for expanded_target in expanded_candidates:
            expanded_path = a_star(_grid, start_pos, expanded_target, relaxed_mask)
            if expanded_path:
                return expanded_path, True

        return None, False

    best_path = None
    best_used_relaxed = False
    seen_targets = set()
    for row in matching_rows:
        primary_target = normalize_target_position(_grid, row["x"], row["y"])
        swapped_target = normalize_target_position(_grid, row["y"], row["x"])
        target_candidates = [p for p in (primary_target, swapped_target) if p is not None]

        unique_candidates = []
        for pos in target_candidates:
            if pos not in seen_targets:
                seen_targets.add(pos)
                unique_candidates.append(pos)
        if not unique_candidates:
            continue

        candidate_path, used_relaxed = _route_from_target_candidates(unique_candidates)
        if candidate_path and (best_path is None or len(candidate_path) < len(best_path)):
            best_path = candidate_path
            best_used_relaxed = used_relaxed

    if best_path is None:
        set_status("No path found. The item may be unreachable.")
        return

    steps = len(best_path) - 1
    if best_used_relaxed:
        set_status(f"Path found with fallback. {steps} steps from {entrance_name} to {item_name}.")
    else:
        set_status(f"Path found. {steps} steps from {entrance_name} to {item_name}.")
    js.renderPath(json.dumps(best_path), json.dumps(list(start_pos)), item_name, entrance_name, steps)

async def bootstrap():
    global _grid, _walkable_mask
    set_status("Loading store grid...")
    _grid = await load_grid_async()
    _walkable_mask = compute_walkable_mask(_grid)
    set_status("Loading item catalog from Supabase...")
    await js.fetchItemsAsync()

# Expose Python callbacks on window for JS calls.
js.window.receive_items = receive_items
js.window.on_category_change = on_category_change
js.window.on_find = on_find

asyncio.ensure_future(bootstrap())
  </script>

  <script>
    const { createClient } = supabase;
    const sb = createClient(
      "https://kqprlrwyogsyziswnuka.supabase.co",
      "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtxcHJscnd5b2dzeXppc3dudWthIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM4NTYzMzIsImV4cCI6MjA4OTQzMjMzMn0.7JBTrZm0n52nfDFz6Kmn2WBgIk9gF8UGE2gvwBjklTA"
    );

    async function fetchItemsAsync() {
      try {
        const { data, error } = await sb.from("items+Cat").select("name, x, y, Category");
        if (error) throw error;
        if (typeof window.receive_items === "function") {
          window.receive_items(JSON.stringify(data || []));
        } else {
          throw new Error("Python runtime not ready yet");
        }
      } catch (e) {
        const status = document.getElementById("status");
        status.textContent = "Supabase error: " + (e?.message || e);
      }
    }

    document.getElementById("cat-select").addEventListener("change", function () {
      if (typeof window.on_category_change === "function") {
        window.on_category_change(this.value);
      }
    });

    function triggerFind() {
      const item = document.getElementById("item-select").value;
      const entrance = document.getElementById("entrance-select").value;
      if (typeof window.on_find === "function") {
        window.on_find(item, entrance);
      }
    }

    const MAP_IMG = new Image();
    MAP_IMG.src = "map_file.png";
    const CELL = 16;
    const ROWS = 41;
    const COLS = 41;
    const Y_SHIFT_CELLS = -1;

    function renderPath(pathJson, startJson, itemName, entranceName, steps) {
      const path = JSON.parse(pathJson);
      const start = JSON.parse(startJson);
      const canvas = document.getElementById("map-canvas");
      const ctx = canvas.getContext("2d");
      canvas.width = COLS * CELL;
      canvas.height = ROWS * CELL;

      const draw = () => {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        if (MAP_IMG.complete && MAP_IMG.naturalWidth > 0) {
          ctx.drawImage(MAP_IMG, 0, 0, canvas.width, canvas.height);
        } else {
          ctx.fillStyle = "#151515";
          ctx.fillRect(0, 0, canvas.width, canvas.height);
        }

        if (path.length > 1) {
          ctx.beginPath();
          ctx.moveTo(path[0][1] * CELL + CELL / 2, (path[0][0] - Y_SHIFT_CELLS) * CELL + CELL / 2);
          for (let i = 1; i < path.length; i++) {
            ctx.lineTo(path[i][1] * CELL + CELL / 2, (path[i][0] - Y_SHIFT_CELLS) * CELL + CELL / 2);
          }
          ctx.strokeStyle = "#00b5ff";
          ctx.lineWidth = 3;
          ctx.lineCap = "round";
          ctx.lineJoin = "round";
          ctx.stroke();
        }

        ctx.beginPath();
        ctx.arc(start[1] * CELL + CELL / 2, (start[0] - Y_SHIFT_CELLS) * CELL + CELL / 2, CELL * 0.45, 0, Math.PI * 2);
        ctx.fillStyle = "#c4c70c";
        ctx.fill();

        const end = path[path.length - 1];
        ctx.beginPath();
        ctx.arc(end[1] * CELL + CELL / 2, (end[0] - Y_SHIFT_CELLS) * CELL + CELL / 2, CELL * 0.45, 0, Math.PI * 2);
        ctx.fillStyle = "#ff4f6d";
        ctx.fill();
      };

      draw();
      MAP_IMG.onload = draw;
      document.getElementById("step-count").textContent =
        `Route: ${entranceName} -> ${itemName} (${steps} steps)`;
    }
  </script>
</body>
